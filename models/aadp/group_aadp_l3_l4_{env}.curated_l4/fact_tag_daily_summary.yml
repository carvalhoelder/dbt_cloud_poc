    - not_null
  - name: process_sk
    description: 'Process Key: The DIM: Process which has this FACT: Tag Daily Summary.'
    data_type: bigint
    tests:
    - not_null
  - name: material_sk
    description: 'Material Key: The DIM: Material which specifies what is being measured
      by this FACT: Tag Daily Summary.'
    data_type: bigint
    tests:
    - not_null
  - name: scenario_sk
    description: 'Scenario Key: The DIM: Scenario which specifies the context of this
      FACT: Tag Daily Summary.'
    data_type: bigint
    tests:
    - not_null
  - name: data_indicator_sk
    description: 'Data Indicator Key: The DIM: Data Indicator which has this FACT:
      Tag Daily Summary.'
    data_type: bigint
    tests:
    - not_null
  - name: tag_code
    description: 'Tag Code: DEFINITION MISSING!'
