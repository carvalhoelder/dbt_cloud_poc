    constraints:
    - type: not_null
    config:
      meta:
        is_pk: true
    tests:
    - not_null
  - name: system_sk
    description: 'System Key: The DIM: System which has this FACT: Tag Daily Summary.'
    data_type: bigint
    tests:
    - not_null
  - name: site_sk
    description: 'Site Key: The DIM: Site V2 which has this FACT: Tag Daily Summary.'
    data_type: bigint
    tests:
    - not_null
  - name: site_reporting_group_sk
    description: 'Site Reporting Group Key: The DIM: Site Reporting Group which has
      this FACT: Tag Daily Summary.'
    data_type: bigint
    tests:
    - not_null
  - name: received_dispatched_site_reporting_group_sk
    description: 'Received Dispatched Site Reporting Group Key: The DIM: Site Reporting
      Group which has this FACT: Tag Daily Summary.'
    data_type: bigint
    tests:
    - not_null
  - name: date_sk
    description: 'Date Key: The DIM: Date which specifies the day of the summary this
      FACT: Tag Daily Summary.'
    data_type: bigint
    tests:
    - not_null
  - name: site_system_shift_date_sk
    description: 'Site System Shift Date Key: The DIM: Site System Shift Date which
      has this FACT: Tag Daily Summary.'
    data_type: bigint
    tests:
    - not_null
  - name: asset_sk
    description: 'Asset Key: The DIM: Asset which specifies the equipment used for
      this FACT: Tag Daily Summary.'
