  - name: tag_kda
    description: 'Tag KDA: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: metric_code
    description: 'Metric Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: amount
    description: 'Amount: DEFINITION MISSING!'
    data_type: double
    tests:
    - not_null
  - name: unit_of_measure_code
    description: 'Unit Of Measure Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: unit_of_measure_name
    description: 'Unit Of Measure Name: DEFINITION MISSING!'
    data_type: string
  - name: reading_date_time_utc
    description: 'Reading Date Time UTC: DEFINITION MISSING!'
    data_type: timestamp
    tests:
    - not_null
  - name: reading_date_time_local
    description: 'Reading Date Time Local: DEFINITION MISSING!'
    data_type: timestamp
    tests:
    - not_null
  - name: source_site_code
    description: 'Source Site Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: source_table_name
    description: 'Source Table Name: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: department_sk
    description: 'Department Key: The unique integer sequence-generated identifier
      for the FACT: Tag Daily Summary in this system.  This is a surrogate key and
      no meaning should be inferred from the content.'
    data_type: bigint
    tests:
    - not_null
  - name: functional_location_sk
    description: 'Functional Location Key: The unique integer sequence-generated identifier
      for the FACT: Tag Daily Summary in this system.  This is a surrogate key and
      no meaning should be inferred from the content.'
    data_type: bigint
    tests:
    - not_null
  - name: reporting_period_sk
    description: 'Reporting Period Key: The unique integer sequence-generated identifier
      for the FACT: Tag Daily Summary in this system.  This is a surrogate key and
      no meaning should be inferred from the content.'
    data_type: bigint
    tests:
    - not_null
  - name: is_active
    description: 'Is Active: DEFINITION MISSING!'
    data_type: boolean
    tests:
    - not_null
  - name: exception_flag
    description: 'Exception Flag: DEFINITION MISSING!'
    data_type: int
    tests:
    - not_null
  description: 'FACT: Tag Daily Summary (from ER/Studio model `D3 - CDP L3-L4 LDM.DM1`):
    A measure of processing amount for a particular tag, for a particular day and
    site.  The measure will relate to the process, material, asset, and/or metric.  The
    scenario will normally be Actual. Tags can be from sensors, silo level, production
    etc.'
  constraints:
  - type: primary_key
    columns: &id001
    - tag_daily_summary_sk
  tests:
  - dbt_utils.unique_combination_of_columns:
      arguments:
        combination_of_columns: *id001
