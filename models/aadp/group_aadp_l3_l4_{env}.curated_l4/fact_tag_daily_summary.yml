version: 2
models:
- name: fact_tag_daily_summary
  columns:
  - name: tag_daily_summary_sk
    description: 'Tag Daily Summary Key: The unique identifier for the FACT: Tag Daily
      Summary in this system.  This is a surrogate key and no meaning should be inferred
      from the content.'
