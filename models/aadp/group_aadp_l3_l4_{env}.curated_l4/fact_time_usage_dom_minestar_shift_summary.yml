version: 2
models:
- name: fact_time_usage_dom_minestar_shift_summary
  columns:
  - name: system_sk
    description: 'System Key: The DIM: System which has this FACT: Time Usage Dom
      Minestar Shift Summary.'
    data_type: bigint
    constraints:
    - type: not_null
    config:
      meta:
        is_pk: true
    tests:
    - not_null
  - name: site_sk
    description: 'Site Key: The DIM: Site V2 which has this FACT: Time Usage Dom Minestar
      Shift Summary.'
    data_type: bigint
    constraints:
    - type: not_null
    config:
      meta:
        is_pk: true
    tests:
    - not_null
  - name: date_sk
    description: 'Date Key: The DIM: Date which has this FACT: Time Usage Dom Minestar
      Shift Summary.'
    data_type: bigint
    constraints:
    - type: not_null
    config:
      meta:
        is_pk: true
    tests:
    - not_null
  - name: site_system_shift_date_sk
    description: 'Site System Shift Date Key: The DIM: Site System Shift Date which
      has this FACT: Time Usage Dom Minestar Shift Summary.'
    data_type: bigint
    constraints:
    - type: not_null
    config:
      meta:
        is_pk: true
    tests:
    - not_null
  - name: asset_sk
    description: 'Asset Key: The DIM: Asset which has this FACT: Time Usage Dom Minestar
      Shift Summary.'
    data_type: bigint
    constraints:
    - type: not_null
    config:
      meta:
        is_pk: true
    tests:
    - not_null
  - name: scenario_sk
    description: 'Scenario Key: The DIM: Scenario which has this FACT: Time Usage
      Dom Minestar Shift Summary.'
    data_type: bigint
    constraints:
    - type: not_null
    config:
      meta:
        is_pk: true
    tests:
    - not_null
  - name: process_sk
    description: 'Process Key: The DIM: Process which has this FACT: Time Usage Dom
      Minestar Shift Summary.'
    data_type: bigint
    constraints:
    - type: not_null
    config:
      meta:
        is_pk: true
    tests:
    - not_null
  - name: department_sk
    description: 'Department Key: The unique integer sequence-generated identifier
      for the FACT: Time Usage Dom Minestar Shift Summary in this system.  This is
      a surrogate key and no meaning should be inferred from the content.'
    data_type: bigint
    constraints:
    - type: not_null
    config:
      meta:
        is_pk: true
    tests:
    - not_null
  - name: site_reporting_group_sk
    description: 'Site Reporting Group Key: The DIM: Site Reporting Group which has
      this FACT: Time Usage Dom Minestar Shift Summary.'
    data_type: bigint
    constraints:
    - type: not_null
    config:
      meta:
        is_pk: true
    tests:
    - not_null
  - name: reporting_period_sk
    description: 'Reporting Period Key: The unique integer sequence-generated identifier
      for the FACT: Time Usage Dom Minestar Shift Summary in this system.  This is
      a surrogate key and no meaning should be inferred from the content.'
    data_type: bigint
    constraints:
    - type: not_null
    config:
      meta:
        is_pk: true
    tests:
    - not_null
  - name: functional_location_sk
    description: 'Functional Location Key: The unique integer sequence-generated identifier
      for the FACT: Time Usage Dom Minestar Shift Summary in this system.  This is
      a surrogate key and no meaning should be inferred from the content.'
    data_type: bigint
    constraints:
    - type: not_null
    config:
      meta:
        is_pk: true
    tests:
    - not_null
  - name: t000
    description: 'T000: The calendar time in seconds.'
    data_type: double
    tests:
    - not_null
  - name: t100
    description: 'T100: The controllable time in seconds, it is defined as the sum
      of T200 and D000.'
    data_type: double
    tests:
    - not_null
  - name: t200
    description: 'T200: The available time in seconds, it is defined as the sum of
      T300 and L000.'
    data_type: double
    tests:
    - not_null
  - name: t300
    description: 'T300: The operating time in seconds, it is defined as the sum of
      P100 and P200.'
    data_type: double
    tests:
    - not_null
  - name: p100
    description: 'P100: The secondary production time in seconds.'
    data_type: double
    tests:
    - not_null
  - name: p200
    description: 'P200: The primary production time in seconds.'
    data_type: double
    tests:
    - not_null
  - name: l000
    description: 'L000: The lost time in seconds, it is defined as the sum of L300,
      L200 and L100.'
    data_type: double
    tests:
    - not_null
  - name: l100
    description: 'L100: The external loss in seconds.'
    data_type: double
    tests:
    - not_null
  - name: l200
    description: 'L200: The internal loss in seconds.'
    data_type: double
    tests:
    - not_null
  - name: l300
    description: 'L300: The system utilisation loss.'
    data_type: double
    tests:
    - not_null
  - name: d000
    description: 'D000: The unavailable time in seconds, it is defined as the sum
      of D100, D200 and D300.'
    data_type: double
    tests:
    - not_null
  - name: d100
    description: 'D100: The unscheduled down time in seconds.'
    data_type: double
    tests:
    - not_null
  - name: d200
    description: 'D200: The scheduled down time in seconds.'
    data_type: double
    tests:
    - not_null
  - name: d300
    description: 'D300: The inoperable down time in seconds.'
    data_type: double
    tests:
    - not_null
  - name: n000
    description: 'N000: The non controllable time in seconds, it is defined as the
      sum of N100 and N200.'
    data_type: double
    tests:
    - not_null
  - name: n100
    description: 'N100: The not scheduled to produce time in seconds.'
    data_type: double
    tests:
    - not_null
  - name: n200
    description: 'N200: The uncontrollable events in seconds.'
    data_type: double
    tests:
    - not_null
  - name: stop_count
    description: 'Stop Count: The number of stoppages which occurred for an asset
      in a shift. A stoppage is defined as event which is classified in one of the
      following time usage codes: L100, L200, L300, D100, D200, D300.'
    data_type: bigint
    tests:
    - not_null
  - name: d100_event_count
    description: 'D100 Event Count: The number of unscheduled downtime events which
      occurred for an asset in a shift.'
    data_type: bigint
    tests:
    - not_null
  - name: is_active
    description: 'Is Active: DEFINITION MISSING!'
    data_type: boolean
    tests:
    - not_null
  - name: exception_flag
    description: 'Exception Flag: DEFINITION MISSING!'
    data_type: bigint
    tests:
    - not_null
  description: 'FACT: Time Usage Dom Minestar Shift Summary (from ER/Studio model
    `D3 - CDP L3-L4 LDM.DM1`): A classification of a block of time within a nominal
    shift day for a particular asset describing its use.'
  constraints:
  - type: primary_key
    columns: &id001
    - system_sk
    - site_sk
    - date_sk
    - site_system_shift_date_sk
    - asset_sk
    - scenario_sk
    - process_sk
    - department_sk
    - site_reporting_group_sk
    - reporting_period_sk
    - functional_location_sk
  tests:
  - dbt_utils.unique_combination_of_columns:
      arguments:
        combination_of_columns: *id001
