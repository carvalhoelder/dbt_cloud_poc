  description: 'OSIPI Tag Daily Summary (from ER/Studio model `D3 - CDP OSIsoft PI
    Source.DM1`): A measure of processing amount for a particular sensor tag, in the
    context of an Asset and Site.  The measure will relate to the process, material,
    and/or metric.  The scenario will normally be Actual.'
  constraints:
  - type: primary_key
    columns: &id001
    - tag_daily_summary_id
  tests:
  - dbt_utils.unique_combination_of_columns:
      arguments:
        combination_of_columns: *id001
