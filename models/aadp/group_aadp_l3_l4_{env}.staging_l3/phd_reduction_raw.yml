version: 2
models:
- name: phd_reduction_raw
  columns:
  - name: phd_reduction_raw_sk
    description: 'PHD Reduction Raw Key: The unique identifier for the PHD Reduction
      Raw in this system.  This is a surrogate key and no meaning should be inferred
      from the content, although it may be used as a sort key to provide a natural
      sort order for the PHD Reduction Raw.'
    data_type: string
    constraints:
    - type: not_null
    config:
      meta:
        is_pk: true
    tests:
    - not_null
  - name: source_system_name
    description: 'Source System Name: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: site_name
    description: 'Site Name: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: tag_code
    description: 'Tag Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: dictionary
    description: 'Dictionary: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: time_scale
    description: 'Time Scale: DEFINITION MISSING!'
    data_type: string
  - name: reduction_entry_type
    description: 'Reduction Entry Type: DEFINITION MISSING!'
    data_type: string
  - name: reporting_date
    description: 'Reporting Date: DEFINITION MISSING!'
    data_type: timestamp
    tests:
    - not_null
  - name: range_start_time
    description: 'Range Start Time: DEFINITION MISSING!'
    data_type: timestamp
    tests:
    - not_null
  - name: range_end_time
    description: 'Range End Time: DEFINITION MISSING!'
    data_type: timestamp
    tests:
    - not_null
  - name: tag_value
    description: 'Tag Value: DEFINITION MISSING!'
    data_type: double
    tests:
    - not_null
  - name: confidence
    description: 'Confidence: DEFINITION MISSING!'
    data_type: bigint
    tests:
    - not_null
  - name: units
    description: 'Units: DEFINITION MISSING!'
    data_type: string
  description: 'PHD Reduction Raw (from ER/Studio model `D3 - CDP Process History
    Database Source.DM1`): DEFINITION MISSING!'
  constraints:
  - type: primary_key
    columns: &id001
    - phd_reduction_raw_sk
  tests:
  - dbt_utils.unique_combination_of_columns:
      arguments:
        combination_of_columns: *id001
