version: 2
models:
- name: minestar_cycle_raw
  columns:
  - name: minestar_cycle_raw_sk
    description: 'Minestar Cycle Raw Key: The unique identifier for the Minestar Cycle
      Raw in this system.  This is a surrogate key and no meaning should be inferred
      from the content, although it may be used as a sort key to provide a natural
      sort order for the Minestar Cycle Raw.'
    data_type: string
    constraints:
    - type: not_null
    config:
      meta:
        is_pk: true
    tests:
    - not_null
  - name: site_name
    description: 'Site Name: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: source_system_name
    description: 'Source System Name: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: source_table_name
    description: 'Source Table Name: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: source_cycle_type_name
    description: 'Source Cycle Type Name: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: reporting_date
    description: 'Reporting Date: DEFINITION MISSING!'
    data_type: date
    tests:
    - not_null
  - name: asset_name
    description: 'Asset Name: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: source_material_group_name
    description: 'Source Material Group Name: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: source_material_destination
    description: 'Source Material Destination: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: source_block_code
    description: 'Source Block Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: amount
    description: 'Amount: DEFINITION MISSING!'
    data_type: double
  description: 'Minestar Cycle Raw (from ER/Studio model `D3 - CDP Cat MineStar Source.DM1`):
    A daily asset material movement value measure for the mining processing model.'
  constraints:
  - type: primary_key
    columns: &id001
    - minestar_cycle_raw_sk
  tests:
  - dbt_utils.unique_combination_of_columns:
      arguments:
        combination_of_columns: *id001
