version: 2
models:
- name: rec_sord_data
  columns:
  - name: rec_sord_data_id
    description: 'reconcilor_sord_data Identifier: DEFINITION MISSING!'
    data_type: string
    constraints:
    - type: not_null
    config:
      meta:
        is_pk: true
    tests:
    - not_null
  - name: source_table_name
    description: 'Source Table Name: Source table name the data is being extracted'
    data_type: string
    tests:
    - not_null
  - name: source_site_name
    description: 'Source Site Name: Source site name the data is being extracted'
    data_type: string
    tests:
    - not_null
  - name: source_system_name
    description: 'Source System Name: Source system name'
    data_type: string
    tests:
    - not_null
  - name: metric_name
    description: 'Metric Name: Name of the metrics'
    data_type: string
    tests:
    - not_null
  - name: material_classification
    description: 'Material Classification: Classification'
    data_type: string
    tests:
    - not_null
  - name: ore_stream
    description: 'Ore Stream: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: attribute
    description: 'Attribute: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: period_start_date
    description: 'Period Start Date: DEFINITION MISSING!'
    data_type: date
    tests:
    - not_null
  - name: period_end_date
    description: 'Period End Date: Measure data'
    data_type: date
    tests:
    - not_null
  - name: metric_code
    description: 'Metric Code: Metric code is build with the combination of Metric
      name and Attribute'
    data_type: string
    tests:
    - not_null
  - name: value
    description: 'Metric Value: Value of the metrics'
    data_type: decimal(18,6)
    tests:
    - not_null
  description: 'Reconcilor Sord Data (from ER/Studio model `D3 - CDP Tactical.DM1`):
    DEFINITION MISSING!'
  constraints:
  - type: primary_key
    columns: &id001
    - rec_sord_data_id
  tests:
  - dbt_utils.unique_combination_of_columns:
      arguments:
        combination_of_columns: *id001
