version: 2
models:
- name: tag_daily_summary
  columns:
  - name: tag_daily_summary_sk
    description: 'Tag Daily Summary Key: The unique identifier for the Tag Daily Summary
      in this system.  This is a surrogate key and no meaning should be inferred from
      the content, although it may be used as a sort key to provide a natural sort
      order for the Tag Daily Summary.'
    data_type: string
    constraints:
    - type: not_null
    config:
      meta:
        is_pk: true
    tests:
    - not_null
  - name: system_code
    description: 'System Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: site_code
    description: 'Site Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: site_reporting_group_code
    description: 'Site Reporting Group Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: received_dispatched_site_reporting_group_code
    description: 'Received Dispatched Site Reporting Group Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: date
    description: 'Date: DEFINITION MISSING!'
    data_type: date
    tests:
    - not_null
  - name: asset_code
    description: 'Asset Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: process_code
    description: 'Process Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: material_code
    description: 'Material Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: scenario_code
    description: 'Scenario Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: data_indicator_code
    description: 'Data Indicator Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: tag_code
    description: 'Tag Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: tag_kda
    description: 'Tag KDA: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: metric_code
    description: 'Metric Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: amount
    description: 'Amount: DEFINITION MISSING!'
    data_type: double
    tests:
    - not_null
  - name: unit_of_measure_code
    description: 'Unit Of Measure Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: reading_date_time_utc
    description: 'Reading Date/Time UTC: DEFINITION MISSING!'
    data_type: timestamp
    tests:
    - not_null
  - name: reading_date_time_local
    description: 'Reading Date/Time Local: DEFINITION MISSING!'
    data_type: timestamp
    tests:
    - not_null
  - name: source_site_code
    description: 'Source Site Code: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  - name: source_table_name
    description: 'Source Table Name: DEFINITION MISSING!'
    data_type: string
    tests:
    - not_null
  description: 'Tag Daily Summary (from ER/Studio model `D3 - CDP L3-L4 LDM.DM1`):
    A measure of processing amount for a particular tag, for a particular day and
    site.  The measure will relate to the process, material, asset, and/or metric.  The
    scenario will normally be Actual. Tags can be from sensors, silo level, production
    etc.'
  constraints:
  - type: primary_key
    columns: &id001
    - tag_daily_summary_sk
  tests:
  - dbt_utils.unique_combination_of_columns:
      arguments:
        combination_of_columns: *id001
